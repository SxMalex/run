services:
  app:
    build: ./app
    ports:
      - "8501:8501"
    env_file: .env
    depends_on:
      - ollama
    volumes:
      - ./app:/app
    restart: unless-stopped

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

volumes:
  ollama_data:
